services:
  bot:
    build: .
    image: telegram-stories-viewer-bot:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - userbot-session:/app/userbot-session
      # локальная SQLite при DATA_STORAGE=sqlite (совпадает с SQLITE_DATABASE_PATH по умолчанию)
      - sqlite-data:/app/data
    # Первый вход userbot (код Telegram): см. docker-compose.login.yml
    #   docker compose -f docker-compose.yml -f docker-compose.login.yml run --rm bot

volumes:
  userbot-session:
  sqlite-data:
